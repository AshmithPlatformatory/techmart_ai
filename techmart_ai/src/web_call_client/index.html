<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Voice Agent - Web Client</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--surface-color);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-top: 0; }
        .status {
            margin: 1.5rem 0;
            padding: 0.75rem;
            border-radius: 0.5rem;
            background: rgba(0,0,0,0.2);
        }
        button {
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 1rem;
        }
        #startBtn { background-color: var(--success-color); color: white; }
        #startBtn:hover { filter: brightness(1.1); }
        #endBtn { background-color: var(--danger-color); color: white; display: none; }
        #endBtn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>TechMart Support</h1>
        <p>Speak with our AI Assistant directly from your browser.</p>
        <div class="status" id="statusText">Ready to connect...</div>
        <button id="startBtn">Start Call</button>
        <button id="endBtn">End Call</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
