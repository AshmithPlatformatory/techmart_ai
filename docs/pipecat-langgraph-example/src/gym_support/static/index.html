<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LangGym Support</title>
  <style>
    :root { --bg:#0f1117; --panel:#171a23; --me:#2563eb; --bot:#262b38; --text:#e7e9ee; --muted:#8b93a7; }
    * { box-sizing: border-box; }
    body { margin:0; height:100vh; display:flex; flex-direction:column; align-items:center;
           background:var(--bg); color:var(--text); font:15px/1.45 system-ui, sans-serif; }
    header { width:100%; max-width:640px; padding:18px 16px 8px; }
    header h1 { margin:0; font-size:18px; }
    header .badge { margin-top:6px; font-size:12px; color:var(--muted); }
    header .badge b { color:#7dd3fc; text-transform:capitalize; }
    #log { width:100%; max-width:640px; flex:1; overflow-y:auto; padding:12px 16px;
           display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:80%; padding:9px 13px; border-radius:14px; white-space:pre-wrap; }
    .me  { align-self:flex-end; background:var(--me); border-bottom-right-radius:4px; }
    .bot { align-self:flex-start; background:var(--bot); border-bottom-left-radius:4px; }
    .typing { color:var(--muted); font-style:italic; }
    form { width:100%; max-width:640px; display:flex; gap:8px; padding:12px 16px 20px; }
    input { flex:1; padding:11px 14px; border-radius:10px; border:1px solid #2b3142;
            background:var(--panel); color:var(--text); font-size:15px; }
    button { padding:0 18px; border:0; border-radius:10px; background:var(--me); color:#fff;
             font-size:15px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <header>
    <h1>🏋️ LangGym Support</h1>
    <div class="badge">You're talking to: <b id="agent">triage</b></div>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="e.g. I'd like to cancel my membership" autofocus />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const threadId = crypto.randomUUID();
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const agentBadge = document.getElementById("agent");

    function bubble(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    bubble("Hi! Welcome to LangGym support. I can help you cancel your membership, check your credits, or book a class. What can I do for you?", "bot");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      bubble(text, "me");
      input.value = "";
      send.disabled = true;
      const typing = bubble("…", "bot typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId, message: text }),
        });
        const data = await res.json();
        typing.remove();
        bubble(data.reply, "bot");
        agentBadge.textContent = data.active_agent;
      } catch (err) {
        typing.remove();
        bubble("Sorry — something went wrong reaching the server.", "bot");
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
